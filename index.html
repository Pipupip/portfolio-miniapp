<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0b0b0b">
<title>Ilya — Portfolio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b0b;--bg2:#111111;--card:rgba(255,255,255,0.03);--card-hover:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--accent:#e8a070;--accent-dim:rgba(232,160,112,0.12);--text:#f0ece4;--text-dim:#8a8a84;--text-muted:#555555;--radius:14px;--radius-sm:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:4px}

/* animated bg blobs */
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.25;animation:blobFloat 18s ease-in-out infinite}
.blob-1{width:400px;height:400px;background:radial-gradient(circle,rgba(232,160,112,0.4),transparent 70%);top:-10%;right:-10%;animation-delay:0s}
.blob-2{width:350px;height:350px;background:radial-gradient(circle,rgba(200,120,200,0.25),transparent 70%);bottom:-10%;left:-10%;animation-delay:-6s}
.blob-3{width:250px;height:250px;background:radial-gradient(circle,rgba(232,160,112,0.2),transparent 70%);top:40%;left:50%;animation-delay:-12s}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-30px) scale(1.08)}50%{transform:translate(-20px,30px) scale(0.95)}75%{transform:translate(30px,20px) scale(1.04)}}

/* particles */
#particles-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

/* page */
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 20px 80px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;position:relative;z-index:1}

/* sections */
.section{display:none;animation:fadeUp .5s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* scroll progress */
#scroll-progress{position:fixed;top:0;left:0;height:2px;background:var(--accent);z-index:999;width:0;transition:width 50ms linear;box-shadow:0 0 12px rgba(232,160,112,0.3)}

/* tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:62px;background:rgba(11,11,11,0.9);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.tabbar-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text-muted);font-family:var(--font);font-size:9px;font-weight:500;cursor:pointer;padding:4px 14px;transition:all .3s;-webkit-tap-highlight-color:transparent;letter-spacing:.5px;text-transform:uppercase}
.tabbar-btn .tab-icon{font-size:20px;line-height:1;transition:all .3s}
.tabbar-btn.active{color:var(--accent)}
.tabbar-btn.active .tab-icon{transform:translateY(-2px)}

/* HOME */
.home{display:flex;flex-direction:column;align-items:center;padding:28px 0 10px;text-align:center}
.avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#d48c60);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#0b0b0b;margin-bottom:14px;box-shadow:0 0 40px rgba(232,160,112,0.2)}
.name{font-size:28px;font-weight:700;color:var(--text);margin-bottom:2px}
.role{font-size:14px;color:var(--text-dim);margin-bottom:6px}
.status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);margin-bottom:20px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card)}
.status-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:30px;background:var(--accent);color:#0b0b0b;font-weight:600;font-size:14px;border:none;cursor:pointer;text-decoration:none;transition:all .3s}
.btn-primary:hover{background:#d48c60;transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,160,112,0.3)}
.btn-primary img{width:16px;height:16px}
.btn-primary:active{transform:translateY(0)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin-top:24px;padding:16px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border)}
.stat{text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.tech{display:flex;gap:10px;margin-top:18px}
.tech span{font-size:22px;opacity:.6;transition:all .3s}
.tech span:hover{opacity:1;transform:translateY(-3px)}

/* section header */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-header h2{font-size:17px;font-weight:700;color:var(--text);white-space:nowrap}
.section-header hr{flex:1;height:1px;background:var(--border);border:none}

/* project filters */
.filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{height:2px;background:transparent}
.filter-btn{padding:5px 14px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .3s;white-space:nowrap;border-radius:20px;font-family:var(--font)}
.filter-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,160,112,0.2)}
.filter-btn:hover{color:var(--text);border-color:var(--text-muted)}

/* projects */
.project-grid{display:flex;flex-direction:column;gap:8px}
.project-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--radius-sm);background:var(--card);border:1px solid var(--border);text-decoration:none;color:inherit;transition:all .3s}
.project-card:hover{background:var(--card-hover);border-color:rgba(255,255,255,0.1);transform:translateX(4px)}
.project-icon{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.project-body{flex:1;min-width:0}
.project-title{font-size:14px;font-weight:600;color:var(--text)}
.project-desc{font-size:11px;color:var(--text-dim);margin-top:1px}
.project-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.project-tag{font-size:9px;padding:2px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent)}
.project-arrow{color:var(--text-muted);font-size:16px;transition:all .3s}
.project-card:hover .project-arrow{color:var(--accent);transform:translateX(4px)}

/* services */
.services-grid{display:flex;flex-direction:column;gap:8px}
.service-card{padding:18px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);transition:all .3s}
.service-card:hover{background:var(--card-hover);border-color:rgba(255,255,255,0.1);transform:translateY(-2px)}
.service-card.featured{border-color:rgba(232,160,112,0.15)}
.service-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.service-left{display:flex;align-items:center;gap:12px}
.service-icon{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:20px}
.service-name{font-size:15px;font-weight:600;color:var(--text)}
.service-price{font-size:20px;font-weight:700;color:var(--accent)}
.service-features{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.service-feature{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.service-feature::before{content:'✓';color:var(--accent);font-weight:700}
.service-btn{width:100%;padding:8px;border-radius:20px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-weight:500;cursor:pointer;transition:all .3s;font-family:var(--font)}
.service-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,160,112,0.2)}
.best-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;background:var(--accent);color:#0b0b0b;font-weight:700;margin-left:6px;letter-spacing:.3px;vertical-align:middle}

/* contacts */
.contacts{display:flex;flex-direction:column;align-items:center;padding:20px 0;text-align:center}
.contact-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#d48c60);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#0b0b0b;margin-bottom:12px;box-shadow:0 0 30px rgba(232,160,112,0.15)}
.contact-name{font-size:22px;font-weight:700;color:var(--text)}
.contact-role{font-size:13px;color:var(--text-dim);margin-bottom:20px}

.contact-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px}
.contact-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--radius-sm);background:var(--card);border:1px solid var(--border);text-decoration:none;color:var(--text);transition:all .3s}
.contact-item:hover{background:var(--card-hover);border-color:rgba(255,255,255,0.1);transform:translateX(4px)}
.contact-item-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-item-icon img{width:20px;height:20px}
.contact-item-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.contact-item-value{font-size:14px;color:var(--text);font-weight:500}
.contact-item:hover .contact-item-value{color:var(--accent)}

.social-row{display:flex;gap:10px;margin-top:20px}
.social-link{width:42px;height:42px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .3s}
.social-link img{width:20px;height:20px;opacity:.5;transition:all .3s}
.social-link:hover{background:var(--card-hover);border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
.social-link:hover img{opacity:.8}

@media(min-width:500px){.project-grid,.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}}
</style>
</head>
<body>

<script>
// Telegram WebApp
if(window.Telegram&&window.Telegram.WebApp){var tg=window.Telegram.WebApp;tg.expand();tg.ready()}

// PARTICLES
(function(){
  var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d');
  var W,H,parts=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  var n=Math.min(50,Math.floor(W*H/15000));
  for(var i=0;i<n;i++)parts.push({x:Math.random()*W,y:Math.random()*H,dx:(Math.random()-.5)*.5,dy:(Math.random()-.5)*.5,r:Math.random()*2+.5,o:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<parts.length;i++){
      var p=parts[i];p.x+=p.dx;p.y+=p.dy;
      if(p.x<0||p.x>W)p.dx*=-1;if(p.y<0||p.y>H)p.dy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(232,160,112,'+p.o+')';ctx.fill();
      for(var j=i+1;j<parts.length;j++){
        var p2=parts[j],dx=p.x-p2.x,dy=p.y-p2.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.strokeStyle='rgba(232,160,112,'+(.06*(1-dist/120))+')';ctx.lineWidth=.5;ctx.stroke()}
      }
    }
    requestAnimationFrame(draw)
  }
  draw()
})();

// SCROLL PROGRESS
(function(){
  var bar=document.getElementById('scroll-progress'),page=document.getElementById('page');
  page.addEventListener('scroll',function(){var h=page.scrollHeight-page.clientHeight;bar.style.width=(page.scrollTop/h*100)+'%'})
})();

// PROJECT DATA
var projects=[
  {title:'Appointment Bot',desc:'Booking bot for barbershops & salons',icon:'📅',cat:'bots',tags:['aiogram','FSM'],url:'https://github.com/pipupip/appointment-bot'},
  {title:'Digital Shop',desc:'Telegram store for digital goods',icon:'🛒',cat:'bots',tags:['aiogram','SQLite'],url:'https://github.com/pipupip/digital-shop-bot'},
  {title:'Booking Bot',desc:'Full-featured booking system',icon:'🔧',cat:'bots',tags:['aiogram','FSM','Reminders'],url:'https://github.com/pipupip/bookingbot'},
  {title:'Admin Panel',desc:'Web dashboard for Telegram bots',icon:'⚙️',cat:'web',tags:['FastAPI','Jinja2'],url:'https://github.com/pipupip/bot-admin-panel'},
  {title:'Classifieds Parser',desc:'Ad monitoring with Telegram alerts',icon:'📊',cat:'parsers',tags:['BS4','SQLite'],url:'https://github.com/pipupip/classifieds-parser'},
  {title:'Advanced Parser',desc:'Multi-platform async parser framework',icon:'🤖',cat:'parsers',tags:['Async','aiohttp'],url:'https://github.com/pipupip/parser-advanced'},
  {title:'NextGen AI',desc:'AI agency corporate website',icon:'🌐',cat:'web',tags:['HTML','CSS','JS'],url:'https://github.com/pipupip/nextgen-ai'},
  {title:'Portfolio',desc:'Developer portfolio website',icon:'🎨',cat:'web',tags:['HTML','CSS','JS'],url:'https://github.com/pipupip/portfolio'}
];

var services=[
  {title:'Telegram Bot',price:'$200',icon:'🤖',features:['Booking system','Admin panel','24/7 support'],featured:false},
  {title:'Data Parser',price:'$150',icon:'📊',features:['Custom selectors','Multi-format export','Auto-updates'],featured:false},
  {title:'Website',price:'$300',icon:'🌐',features:['Responsive design','SEO optimized','Form integration'],featured:false},
  {title:'Quick Start',price:'$500',icon:'🚀',features:['Website + Bot','Video promo','Priority support'],featured:true}
];

// RENDER
(function(){
  var grid=document.getElementById('project-grid');
  function render(filter){
    var h='';
    projects.forEach(function(p,i){
      if(filter!=='all'&&p.cat!==filter)return;
      h+='<a href="'+p.url+'" target="_blank" class="project-card">'+
        '<div class="project-icon">'+p.icon+'</div>'+
        '<div class="project-body"><div class="project-title">'+p.title+'</div><div class="project-desc">'+p.desc+'</div>'+
        '<div class="project-tags">'+p.tags.map(function(t){return'<span class="project-tag">'+t+'</span>'}).join('')+'</div></div>'+
        '<span class="project-arrow">→</span></a>'
    });
    grid.innerHTML=h||'<div style="text-align:center;padding:40px;color:var(--text-dim)">No projects</div>'
  }
  render('all');
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(x){x.classList.remove('active')});
      b.classList.add('active');render(b.getAttribute('data-filter'))
    })
  })
})();

(function(){
  var grid=document.getElementById('services-grid'),h='';
  services.forEach(function(s){
    h+='<div class="service-card'+(s.featured?' featured':'')+'">'+
      '<div class="service-top"><div class="service-left"><div class="service-icon">'+s.icon+'</div><div><div class="service-name">'+s.title+(s.featured?' <span class="best-badge">BEST</span>':'')+'</div></div></div>'+
      '<div class="service-price">'+s.price+'</div></div>'+
      '<div class="service-features">'+s.features.map(function(f){return'<div class="service-feature">'+f+'</div>'}).join('')+'</div>'+
      '<button class="service-btn" onclick="window.open(\'https://t.me/biggesttroll\',\'_blank\')">Order →</button></div>'
  });
  grid.innerHTML=h
})();

// TABS
(function(){
  var tabs=document.querySelectorAll('.tabbar-btn'),map={home:'s-home',projects:'s-projects',services:'s-services',contacts:'s-contacts'};
  tabs.forEach(function(t){
    t.addEventListener('click',function(){
      tabs.forEach(function(x){x.classList.remove('active')});t.classList.add('active');
      var id=map[t.getAttribute('data-tab')];if(!id)return;
      document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
      document.getElementById(id).classList.add('active');document.getElementById('page').scrollTop=0
    })
  })
})();
</script>
