<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Ilya — Portfolio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--accent:#e8a070;--accent2:#7c3aed;--text:#f0ece4;--text-dim:#8884a0;--text-muted:#5c5a6e;--glass:rgba(255,255,255,0.03);--glass-border:rgba(255,255,255,0.06);--glass-hover:rgba(255,255,255,0.06);--radius:16px;--radius-sm:10px;--transition:all 0.4s cubic-bezier(0.4,0,0.2,1);--shadow:0 8px 32px rgba(0,0,0,0.5);--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif}
html{height:100%}
body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.5}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:4px}

/* Progress bar */
#progress-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:999;width:0;transition:width 50ms linear;border-radius:0 2px 2px 0;box-shadow:0 0 12px rgba(232,160,112,0.4)}

/* Particles */
#particles-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
/* Decorative blobs */
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.3;animation:blobFloat 20s ease-in-out infinite}
.blob-1{width:400px;height:400px;background:radial-gradient(circle,var(--accent),transparent 70%);top:-10%;right:-10%;animation-delay:0s}
.blob-2{width:350px;height:350px;background:radial-gradient(circle,var(--accent2),transparent 70%);bottom:-10%;left:-10%;animation-delay:-7s}
.blob-3{width:250px;height:250px;background:radial-gradient(circle,rgba(232,160,112,0.5),transparent 70%);top:50%;left:50%;animation-delay:-14s}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-40px) scale(1.1)}50%{transform:translate(-20px,20px) scale(0.95)}75%{transform:translate(40px,30px) scale(1.05)}}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

/* Page */
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px 90px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;position:relative;z-index:1}

/* Sections */
.section{display:none}
.section.active{display:block}
.section.active .anim-reveal{animation:fadeSlide 0.5s ease forwards}
.section.active .anim-reveal:nth-child(2){animation-delay:0.08s}
.section.active .anim-reveal:nth-child(3){animation-delay:0.16s}
.section.active .anim-reveal:nth-child(4){animation-delay:0.24s}
.section.active .anim-reveal:nth-child(5){animation-delay:0.32s}
.section.active .anim-reveal:nth-child(6){animation-delay:0.4s}
.section.active .anim-reveal:nth-child(7){animation-delay:0.48s}
.section.active .anim-reveal:nth-child(8){animation-delay:0.56s}
.section.active .anim-reveal:nth-child(9){animation-delay:0.64s}
.section.active .anim-reveal:nth-child(10){animation-delay:0.72s}
@keyframes fadeSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Glass card base */
.glass{border-radius:var(--radius);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);transition:var(--transition)}
.glass:hover{background:var(--glass-hover);border-color:rgba(255,255,255,0.12)}

/* Glow text */
.glow-text{font-size:clamp(36px,10vw,56px);font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;display:inline-block;filter:drop-shadow(0 0 30px rgba(232,160,112,0.15))}
.glow-text::after{content:'';position:absolute;inset:-20px;background:radial-gradient(circle,var(--accent),transparent 70%);opacity:0.1;pointer-events:none;z-index:-1}

/* HOME */
.home-wrap{display:flex;flex-direction:column;align-items:center;padding:12px 0 0;text-align:center}
.home-logo{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;color:#0a0a0f;box-shadow:0 0 60px rgba(232,160,112,0.25),0 0 120px rgba(124,58,237,0.1);margin-bottom:16px;position:relative}
.home-logo::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));z-index:-1;opacity:0.5;filter:blur(12px);animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}
.status-row{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);font-size:12px;color:var(--text-dim);margin-bottom:8px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;position:relative}
.status-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:#4ade80;opacity:0.3;animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(2);opacity:0}}
.typewriter-wrap{margin:4px 0 8px}
.typewriter{font-size:17px;color:var(--accent);overflow:hidden;white-space:nowrap;border-right:2px solid var(--accent);display:inline-block;max-width:100%;font-weight:500}
@keyframes blink{0%,100%{border-color:var(--accent)}50%{border-color:transparent}}
.tg-link{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);text-decoration:none;font-size:13px;padding:6px 18px;border-radius:20px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);transition:var(--transition);margin-bottom:20px}
.tg-link:hover{color:var(--accent);border-color:var(--accent);transform:translateY(-1px)}
.btn-glow{display:inline-flex;align-items:center;gap:10px;padding:14px 38px;border-radius:30px;background:linear-gradient(135deg,var(--accent),#d4834a);color:#0a0a0f;font-weight:700;font-size:15px;border:none;cursor:pointer;text-decoration:none;transition:var(--transition);box-shadow:0 4px 24px rgba(232,160,112,0.35);position:relative;overflow:hidden}
.btn-glow::before{content:'';position:absolute;inset:0;border-radius:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:var(--transition)}
.btn-glow:hover::before{opacity:1}
.btn-glow span,.btn-glow svg{position:relative;z-index:1}
.btn-glow:hover{transform:translateY(-3px);box-shadow:0 8px 36px rgba(232,160,112,0.45)}
.btn-glow:active{transform:translateY(-1px)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;margin-top:24px;padding:16px;border-radius:var(--radius);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border)}
.stat-item{text-align:center}
.stat-value{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
@media(max-width:380px){.stats-row{grid-template-columns:repeat(2,1fr)}}

/* Section header */
.section-header{margin-bottom:20px;padding-top:4px}
.section-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.section-sub{font-size:13px;color:var(--text-dim);margin-top:2px}

/* Filter tabs */
.filter-row{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:7px 18px;border-radius:20px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition);-webkit-tap-highlight-color:transparent;user-select:none;font-family:var(--font)}
.filter-btn:hover{border-color:var(--text-muted)}
.filter-btn.active{background:linear-gradient(135deg,var(--accent),#d4834a);color:#0a0a0f;border-color:transparent;font-weight:700;box-shadow:0 4px 20px rgba(232,160,112,0.3)}

/* Project grid */
.proj-grid{display:grid;grid-template-columns:1fr;gap:12px}
.proj-card{display:flex;align-items:flex-start;gap:14px;padding:16px;border-radius:var(--radius-sm);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);text-decoration:none;color:var(--text);transition:var(--transition);position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:var(--transition);border-radius:var(--radius-sm)}
.proj-card:hover::before{opacity:0.06}
.proj-card:hover{transform:translateX(4px);border-color:rgba(232,160,112,0.3)}
.proj-card:active{transform:translateX(2px)}
.proj-icon-wrap{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,rgba(232,160,112,0.15),rgba(124,58,237,0.15));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proj-icon-wrap svg{width:22px;height:22px;color:var(--accent)}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:14px;font-weight:600;margin-bottom:3px}
.proj-desc{font-size:12px;color:var(--text-dim);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.proj-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.proj-tag{font-size:9px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.04);color:var(--text-muted);border:1px solid var(--glass-border)}
.proj-link{color:var(--text-muted);transition:var(--transition);flex-shrink:0;align-self:center}
.proj-card:hover .proj-link{color:var(--accent);transform:translateX(4px)}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:14px}

/* Services */
.serv-grid{display:grid;grid-template-columns:1fr;gap:12px}
.serv-card{padding:24px;border-radius:var(--radius);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);transition:var(--transition);position:relative;overflow:hidden}
.serv-card:hover{transform:translateY(-4px);border-color:rgba(232,160,112,0.2);background:var(--glass-hover)}
.serv-card.featured{background:linear-gradient(135deg,rgba(232,160,112,0.08),rgba(124,58,237,0.08));border-color:rgba(232,160,112,0.25);box-shadow:0 0 40px rgba(232,160,112,0.08)}
.serv-card.featured::before{content:'★ Featured';position:absolute;top:12px;right:12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:3px 10px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0a0f}
.serv-icon-wrap{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,rgba(232,160,112,0.15),rgba(124,58,237,0.15));display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.serv-icon-wrap svg{width:24px;height:24px;color:var(--accent)}
.serv-name{font-size:18px;font-weight:700;margin-bottom:4px}
.serv-price{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.serv-features{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.serv-features li{font-size:13px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.serv-features li svg{width:14px;height:14px;color:var(--accent);flex-shrink:0}
.btn-order{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:24px;background:linear-gradient(135deg,var(--accent),#d4834a);color:#0a0a0f;font-weight:700;font-size:13px;border:none;cursor:pointer;text-decoration:none;transition:var(--transition);box-shadow:0 4px 16px rgba(232,160,112,0.25);font-family:var(--font)}
.btn-order:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,160,112,0.35)}
.btn-order:active{transform:translateY(0)}

/* Contacts */
.contact-list{display:flex;flex-direction:column;gap:10px}
.contact-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--radius-sm);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);text-decoration:none;color:var(--text);transition:var(--transition);position:relative;overflow:hidden}
.contact-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:var(--transition)}
.contact-item:hover::before{opacity:0.06}
.contact-item:hover{transform:translateX(4px);border-color:rgba(232,160,112,0.3)}
.contact-icon-wrap{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,rgba(232,160,112,0.12),rgba(124,58,237,0.12));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-icon-wrap svg{width:20px;height:20px;color:var(--accent)}
.contact-info{flex:1;position:relative;z-index:1}
.contact-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.contact-value{font-size:14px;font-weight:500}
.contact-arrow{color:var(--text-muted);transition:var(--transition);flex-shrink:0;position:relative;z-index:1}
.contact-item:hover .contact-arrow{color:var(--accent);transform:translateX(4px)}
.contact-cta{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.contact-cta .btn-glow{justify-content:center}

/* Tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(10,10,15,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0)}
.tabbar-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text-muted);font-size:9px;font-weight:500;cursor:pointer;padding:4px 16px;border-radius:14px;transition:var(--transition);position:relative;min-width:56px;letter-spacing:0.3px;-webkit-tap-highlight-color:transparent;user-select:none;font-family:var(--font)}
.tabbar-btn svg{width:22px;height:22px;transition:var(--transition)}
.tabbar-btn .tab-label{transition:var(--transition);margin-top:1px}
.tabbar-btn.active{color:var(--accent)}
.tabbar-btn.active svg{filter:drop-shadow(0 0 8px rgba(232,160,112,0.4))}
.tabbar-btn.active .tab-label{color:var(--accent)}
.tabbar-btn.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;border-radius:0 0 4px 4px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px rgba(232,160,112,0.4)}
.tabbar-btn:active{transform:scale(0.92)}

/* Breakpoints */
@media(min-width:480px){.proj-grid{grid-template-columns:1fr 1fr}.serv-grid{grid-template-columns:1fr 1fr}.page{padding:24px 24px 90px}}
@media(min-width:640px){.proj-grid{grid-template-columns:1fr 1fr}.serv-grid{grid-template-columns:1fr 1fr}}
@media(min-width:768px){.proj-grid{grid-template-columns:1fr 1fr 1fr}.serv-grid{grid-template-columns:1fr 1fr}.page{padding:32px 32px 90px;max-width:720px;margin:0 auto}}
</style>
</head>
<body>

<div id="progress-bar"></div>
<canvas id="particles-canvas"></canvas>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="app" id="app">
  <div class="page" id="page">

    <!-- HOME -->
    <div class="section active" id="section-home">
      <div class="home-wrap">
        <div class="anim-reveal">
          <div class="home-logo">I</div>
        </div>
        <div class="anim-reveal status-row">
          <span class="status-dot"></span>
          Available for work
        </div>
        <div class="anim-reveal">
          <h1 class="glow-text">Ilya</h1>
        </div>
        <div class="anim-reveal typewriter-wrap">
          <span class="typewriter" id="typewriter"></span>
        </div>
        <div class="anim-reveal">
          <a class="tg-link" href="https://t.me/biggesttroll" target="_blank">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2L2.5 9.5l7 2.5 2.5 7 9-16.5z"/><path d="M12 12l6-6"/></svg>
            @biggesttroll
          </a>
        </div>
        <div class="anim-reveal">
          <a class="btn-glow" href="https://github.com/pipupip/portfolio" target="_blank">
            <span>Open Portfolio</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
        <div class="anim-reveal stats-row">
          <div class="stat-item"><div class="stat-value">47+</div><div class="stat-label">Projects</div></div>
          <div class="stat-item"><div class="stat-value">32+</div><div class="stat-label">Clients</div></div>
          <div class="stat-item"><div class="stat-value">98%</div><div class="stat-label">On Time</div></div>
          <div class="stat-item"><div class="stat-value">5+</div><div class="stat-label">Years</div></div>
        </div>
      </div>
    </div>

    <!-- PROJECTS -->
    <div class="section" id="section-projects">
      <div class="anim-reveal section-header">
        <div class="section-title">Projects</div>
        <div class="section-sub">Things I've built</div>
      </div>
      <div class="anim-reveal filter-row" id="filter-row"></div>
      <div class="proj-grid" id="proj-grid"></div>
    </div>

    <!-- SERVICES -->
    <div class="section" id="section-services">
      <div class="anim-reveal section-header">
        <div class="section-title">Services</div>
        <div class="section-sub">What I can do for you</div>
      </div>
      <div class="serv-grid" id="serv-grid"></div>
    </div>

    <!-- CONTACTS -->
    <div class="section" id="section-contacts">
      <div class="anim-reveal section-header">
        <div class="section-title">Contacts</div>
        <div class="section-sub">Let's work together</div>
      </div>
      <div class="anim-reveal contact-list" id="contact-list"></div>
      <div class="anim-reveal contact-cta">
        <a class="btn-glow" href="https://t.me/biggesttroll" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2L2.5 9.5l7 2.5 2.5 7 9-16.5z"/><path d="M12 12l6-6"/></svg>
          <span>Contact Me</span>
        </a>
      </div>
    </div>

  </div>

  <!-- Tab Bar -->
  <nav class="tabbar" id="tabbar">
    <button class="tabbar-btn active" data-section="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="tab-label">Home</span>
    </button>
    <button class="tabbar-btn" data-section="projects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span class="tab-label">Projects</span>
    </button>
    <button class="tabbar-btn" data-section="services">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
      <span class="tab-label">Services</span>
    </button>
    <button class="tabbar-btn" data-section="contacts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <span class="tab-label">Contacts</span>
    </button>
  </nav>
</div>

<script>
(function(){
  'use strict';

  // Telegram WebApp
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.expand();

  function typeLoop(){
    var cur = roles[ri];

      tw.textContent = cur.substring(0, ci+1);

      if (ci === cur.length){
        deleting = true;
        setTimeout(typeLoop, 2000);
        return;
      }
      setTimeout(typeLoop, 75);
    } else {
      tw.textContent = cur.substring(0, ci-1);
      ci--;
      if (ci === 0){
        deleting = false;
        ri = (ri+1) % roles.length;

        return;
      }

  // ====== PARTICLES ======
  var canvas = document.getElementById('particles-canvas');
  var ctx = canvas.getContext('2d');
  var W, H;
  var particles = [];
  var PARTICLE_COUNT = 60;

  function resizeCanvas(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function createParticles(){
    for (var i = 0; i < PARTICLE_COUNT; i++){
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.8 + 0.5,
        dx: (Math.random() - 0.5) * 0.4,
        dy: (Math.random() - 0.5) * 0.4,
        o: Math.random() * 0.5 + 0.1
      });
    }
  }
  createParticles();

  function drawParticles(){
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < particles.length; i++){
      var p = particles[i];
      p.x += p.dx;
      p.y += p.dy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(232,160,112,' + p.o + ')';
      ctx.fill();
      // lines
      for (var j = i + 1; j < particles.length; j++){
        var p2 = particles[j];
        var dx = p.x - p2.x;
        var dy = p.y - p2.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120){
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = 'rgba(232,160,112,' + (0.06 * (1 - dist / 120)) + ')';
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
