<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Ilya — Portfolio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--surface:#111122;--card:rgba(20,20,40,0.5);--border:rgba(0,255,255,0.15);--neon:#00fff7;--neon2:#ff00e4;--neon3:#ffcc00;--text:#e0e0ff;--text-dim:#7070aa;--radius:12px;--font:'SF Mono','Fira Code','Cascadia Code',monospace}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Matrix Rain */
#matrix-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.15}
.noise-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px}

/* Scanline */
.scanline{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,0.015) 2px,rgba(0,255,255,0.015) 4px)}

/* Progress bar */
#progress-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--neon),var(--neon2));z-index:999;width:0;transition:width 50ms linear;box-shadow:0 0 12px rgba(0,255,247,0.4)}

/* Neon glow keyframes */
@keyframes flicker{0%,100%{opacity:1}92%{opacity:0.95}94%{opacity:0.3}96%{opacity:0.95}98%{opacity:0.2}}
@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(2px,-2px)}60%{transform:translate(-1px,1px)}80%{transform:translate(1px,-1px)}100%{transform:translate(0)}}
@keyframes neonPulse{0%,100%{box-shadow:0 0 5px var(--neon),0 0 20px rgba(0,255,247,0.3)}50%{box-shadow:0 0 10px var(--neon),0 0 40px rgba(0,255,247,0.5)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:2}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px 90px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-track{background:transparent}
.page::-webkit-scrollbar-thumb{background:var(--neon);border-radius:4px;box-shadow:0 0 8px var(--neon)}

/* Sections */
.section{display:none}
.section.active{display:block}
.section.active>*{animation:fadeSlide 0.5s ease forwards}
.section.active>*:nth-child(2){animation-delay:0.06s}
.section.active>*:nth-child(3){animation-delay:0.12s}
.section.active>*:nth-child(4){animation-delay:0.18s}
.section.active>*:nth-child(5){animation-delay:0.24s}
.section.active>*:nth-child(6){animation-delay:0.30s}
.section.active>*:nth-child(7){animation-delay:0.36s}
.section.active>*:nth-child(8){animation-delay:0.42s}
.section.active>*:nth-child(9){animation-delay:0.48s}
.section.active>*:nth-child(10){animation-delay:0.54s}

/* Tab Bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(10,10,18,0.95);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(20px)}
.tabbar-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text-dim);font-family:var(--font);font-size:9px;font-weight:500;cursor:pointer;padding:4px 12px;transition:all 0.3s;text-transform:uppercase;letter-spacing:1px}
.tabbar-btn .tab-icon{font-size:20px;line-height:1;transition:all 0.3s}
.tabbar-btn.active{color:var(--neon);text-shadow:0 0 10px rgba(0,255,247,0.5)}
.tabbar-btn.active .tab-icon{filter:drop-shadow(0 0 6px var(--neon))}

/* HOME */
.home{display:flex;flex-direction:column;align-items:center;padding:20px 0 10px;text-align:center}
.home-badge{font-size:10px;color:var(--neon);text-transform:uppercase;letter-spacing:3px;margin-bottom:16px;border:1px solid rgba(0,255,247,0.2);padding:4px 14px;border-radius:4px;background:rgba(0,255,247,0.05)}
.home-logo{font-size:56px;margin-bottom:8px;animation:neonPulse 3s ease-in-out infinite;border-radius:50%;width:100px;height:100px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border)}
.home-name{font-size:32px;font-weight:700;color:var(--text);margin-bottom:2px;animation:flicker 4s infinite}
.neon-accent{color:var(--neon);text-shadow:0 0 10px rgba(0,255,247,0.5)}
.neon-accent2{color:var(--neon2);text-shadow:0 0 10px rgba(255,0,228,0.5)}
.neon-accent3{color:var(--neon3);text-shadow:0 0 10px rgba(255,204,0,0.5)}
.typewriter-wrap{height:28px;margin:4px 0 12px}
.typewriter{font-size:14px;color:var(--text-dim);overflow:hidden;white-space:nowrap;border-right:2px solid var(--neon);display:inline-block;max-width:100%;letter-spacing:1px}

.neon-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;font-family:var(--font);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:#0a0a12;background:var(--neon);border:none;cursor:pointer;text-decoration:none;transition:all 0.3s;box-shadow:0 0 20px rgba(0,255,247,0.3),inset 0 0 20px rgba(0,255,247,0.1);border-radius:4px;position:relative;overflow:hidden}
.neon-btn::after{content:'';position:absolute;inset:-2px;border:1px solid var(--neon);border-radius:4px;opacity:0;transition:all 0.3s}
.neon-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,255,247,0.5),inset 0 0 20px rgba(0,255,247,0.2)}
.neon-btn:hover::after{opacity:1}
.neon-btn:active{transform:translateY(0)}

.neon-btn--ghost{background:transparent;color:var(--neon);box-shadow:none;border:1px solid var(--neon)}
.neon-btn--ghost:hover{background:rgba(0,255,247,0.1);box-shadow:0 0 20px rgba(0,255,247,0.2);color:var(--neon)}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin-top:24px}
.stat-cell{padding:12px 8px;border:1px solid var(--border);background:var(--card);text-align:center;border-radius:4px}
.stat-cell__num{font-size:20px;font-weight:700;color:var(--neon);text-shadow:0 0 10px rgba(0,255,247,0.3)}
.stat-cell__label{font-size:9px;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:1px}

.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--neon);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);text-shadow:0 0 10px rgba(0,255,247,0.3)}

/* PROJECTS */
.project-filters{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.project-filters::-webkit-scrollbar{height:2px}
.project-filters::-webkit-scrollbar-thumb{background:var(--neon)}
.filter-btn{padding:6px 14px;font-family:var(--font);font-size:10px;text-transform:uppercase;letter-spacing:1px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;transition:all 0.3s;white-space:nowrap;border-radius:4px}
.filter-btn.active{background:rgba(0,255,247,0.1);color:var(--neon);border-color:var(--neon);box-shadow:0 0 10px rgba(0,255,247,0.2)}
.filter-btn:hover{border-color:var(--neon);color:var(--neon)}

.project-grid{display:grid;grid-template-columns:1fr;gap:10px}
.project-card{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);background:var(--card);border-radius:4px;cursor:pointer;transition:all 0.3s;text-decoration:none;color:inherit}
.project-card:hover{border-color:var(--neon);box-shadow:0 0 20px rgba(0,255,247,0.1);transform:translateX(4px)}
.project-card__icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;flex-shrink:0;background:rgba(0,255,247,0.03)}
.project-card__body{flex:1;min-width:0}
.project-card__title{font-size:13px;font-weight:600;color:var(--text)}
.project-card__desc{font-size:11px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-card__tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.project-tag{font-size:8px;padding:2px 6px;border:1px solid rgba(0,255,247,0.15);border-radius:2px;color:var(--neon);text-transform:uppercase;letter-spacing:0.5px;font-family:var(--font)}
.project-card__arrow{color:var(--text-dim);font-size:16px;transition:all 0.3s}
.project-card:hover .project-card__arrow{color:var(--neon);transform:translateX(4px)}

/* SERVICES */
.services-grid{display:grid;grid-template-columns:1fr;gap:10px}
.service-card{padding:16px;border:1px solid var(--border);background:var(--card);border-radius:4px;transition:all 0.3s;text-decoration:none;color:inherit;display:block}
.service-card:hover{border-color:var(--neon);box-shadow:0 0 20px rgba(0,255,247,0.1);transform:translateY(-2px)}
.service-card.featured{border-color:var(--neon2);box-shadow:0 0 20px rgba(255,0,228,0.1);position:relative}
.service-card.featured::before{content:'HOT';position:absolute;top:-1px;right:16px;font-size:9px;padding:2px 8px;background:var(--neon2);color:#0a0a12;font-weight:700;letter-spacing:1px;font-family:var(--font)}
.service-card__header{display:flex;justify-content:space-between;align-items:flex-start}
.service-card__icon{font-size:32px;margin-bottom:8px}
.service-card__title{font-size:14px;font-weight:600;color:var(--text)}
.service-card__price{font-size:20px;font-weight:700;color:var(--neon);text-shadow:0 0 10px rgba(0,255,247,0.3)}
.service-card.featured .service-card__price{color:var(--neon2);text-shadow:0 0 10px rgba(255,0,228,0.3)}
.service-card__features{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.service-card__feature{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.service-card__feature::before{content:'▸';color:var(--neon);font-size:12px}
.service-card.featured .service-card__feature::before{color:var(--neon2)}
.service-card__btn{margin-top:12px;width:100%;padding:8px;font-family:var(--font);font-size:11px;text-transform:uppercase;letter-spacing:2px;background:transparent;border:1px solid var(--neon);color:var(--neon);cursor:pointer;transition:all 0.3s;border-radius:4px}
.service-card__btn:hover{background:rgba(0,255,247,0.1);box-shadow:0 0 15px rgba(0,255,247,0.2)}
.service-card.featured .service-card__btn{border-color:var(--neon2);color:var(--neon2)}
.service-card.featured .service-card__btn:hover{background:rgba(255,0,228,0.1);box-shadow:0 0 15px rgba(255,0,228,0.2)}

/* CONTACTS */
.contacts{display:flex;flex-direction:column;align-items:center;padding:20px 0;text-align:center}
.contact-avatar{font-size:48px;width:90px;height:90px;display:flex;align-items:center;justify-content:center;border:2px solid var(--neon);border-radius:50%;margin-bottom:12px;background:var(--card);box-shadow:0 0 30px rgba(0,255,247,0.15);animation:neonPulse 3s ease-in-out infinite}
.contact-name{font-size:24px;font-weight:700;color:var(--text);margin-bottom:2px}
.contact-role{font-size:12px;color:var(--text-dim);margin-bottom:20px;letter-spacing:1px}

.contact-links{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.contact-link{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1px solid var(--border);background:var(--card);border-radius:4px;text-decoration:none;color:var(--text);transition:all 0.3s}
.contact-link:hover{border-color:var(--neon);box-shadow:0 0 20px rgba(0,255,247,0.1);transform:translateX(4px)}
.contact-link__icon{font-size:24px;width:36px;text-align:center}
.contact-link__label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.contact-link__value{font-size:14px;color:var(--text)}
.contact-link:hover .contact-link__value{color:var(--neon)}

.contact-divider{width:100%;max-width:320px;height:1px;background:var(--border);margin:16px 0}
.social-row{display:flex;gap:12px}
.social-link{width:44px;height:44px;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;color:var(--text-dim);transition:all 0.3s;background:var(--card)}
.social-link:hover{border-color:var(--neon);color:var(--neon);box-shadow:0 0 15px rgba(0,255,247,0.15);transform:translateY(-2px)}

/* Responsive */
@media(min-width:400px){
  .project-grid{grid-template-columns:1fr}
  .services-grid{grid-template-columns:1fr}
}
@media(min-width:500px){
  .project-grid{grid-template-columns:repeat(2,1fr)}
  .services-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

// === Telegram WebApp ===
if(window.Telegram && window.Telegram.WebApp) {
  var tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();
  if(tg.colorScheme === 'light') document.documentElement.style.setProperty('--bg','#f0f0ff');
}

// === MATRIX RAIN ===
(function() {
  var c = document.getElementById('matrix-canvas');
  var ctx = c.getContext('2d');
  var chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789<>/{}[]';
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize(); window.addEventListener('resize', resize);
  var cols = Math.floor(c.width / 14);
  var drops = [];
  for(var i=0;i<cols;i++) drops[i]=Math.random()*100;
  function draw(){
    ctx.fillStyle='rgba(10,10,18,0.05)';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#00fff7';ctx.font='12px monospace';ctx.shadowBlur=6;ctx.shadowColor='rgba(0,255,247,0.3)';
    for(var i=0;i<drops.length;i++){
      var ch=chars[Math.floor(Math.random()*chars.length)];
      ctx.fillText(ch,i*14,drops[i]*14);
      if(drops[i]*14>c.height||Math.random()>0.98) drops[i]=0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  setTimeout(function(){
    setInterval(function(){ctx.shadowBlur=12;ctx.shadowColor='rgba(0,255,247,0.5)';setTimeout(function(){ctx.shadowBlur=6},200)},3000);
  },5000);
  draw();
})();

// === TYPEWRITER ===
(function(){
  var el=document.getElementById('typewriter');
  if(!el)return;
  var phrases=['Python Developer','Media Creator','Automation Expert','Bot Engineer','Data Miner'];
  var pi=0,ci=0,del=false;
  var txt='';
  function type(){
    var t=phrases[pi];
    if(!del){txt=t.substring(0,ci+1);ci++;if(ci===t.length){del=true;setTimeout(type,2000);el.textContent=txt;return;}}
    else{txt=t.substring(0,ci-1);ci--;if(ci===0){del=false;pi=(pi+1)%phrases.length;}}
    el.textContent=txt;
    setTimeout(type,del?20:50);
  }
  setTimeout(type,1000);
})();

];

var services = [
  {title:'Telegram Bot',price:'$200',icon:'🤖',features:['Booking system','Admin panel','24/7 support'],featured:false},
  {title:'Data Parser',price:'$150',icon:'📊',features:['Custom selectors','Multi-format export','Auto-updates'],featured:false},
  {title:'Website',price:'$300',icon:'🌐',features:['Responsive design','SEO optimized','Form integration'],featured:false},
  {title:'Quick Start',price:'$500',icon:'🚀',features:['Website + Bot','Video promo','Priority support'],featured:true}
];

// === RENDER PROJECTS ===
(function(){
  var grid=document.getElementById('project-grid');
  function render(filter){
    var html='';
    projects.forEach(function(p,i){
      if(filter!=='all'&&p.cat!==filter)return;
      html+='<a href="'+p.url+'" target="_blank" class="project-card" style="animation-delay:'+((i%6)*0.06)+'s">'+
        '<div class="project-card__icon">'+p.icon+'</div>'+
        '<div class="project-card__body">'+
          '<div class="project-card__title">'+p.title+'</div>'+
          '<div class="project-card__desc">'+p.desc+'</div>'+
          '<div class="project-card__tags">'+p.tags.map(function(t){return'<span class="project-tag">'+t+'</span>'}).join('')+'</div>'+
        '</div>'+
        '<span class="project-card__arrow">→</span>'+
      '</a>';
    });
    grid.innerHTML=html||'<div style="text-align:center;padding:40px;color:var(--text-dim)">No projects in this category</div>';
  }
  render('all');
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      render(btn.getAttribute('data-filter'));
    });
  });
})();

// === RENDER SERVICES ===
(function(){
  var grid=document.getElementById('services-grid');
  var html='';
  services.forEach(function(s){
    html+='<div class="service-card'+(s.featured?' featured':'')+'">'+
      '<div class="service-card__header"><div><div class="service-card__icon">'+s.icon+'</div><div class="service-card__title">'+s.title+'</div></div><div class="service-card__price">'+s.price+'</div></div>'+
      '<div class="service-card__features">'+s.features.map(function(f){return'<div class="service-card__feature">'+f+'</div>'}).join('')+'</div>'+
      '<button class="service-card__btn" onclick="window.open(\'https://t.me/biggesttroll\',\'_blank\')">ORDER →</button>'+
    '</div>';
  });
  grid.innerHTML=html;
})();

// === TAB NAVIGATION ===
(function(){
  var tabs=document.querySelectorAll('.tabbar-btn');
  var sections={home:'s-home',projects:'s-projects',services:'s-services',contacts:'s-contacts'};
  tabs.forEach(function(tab){
    tab.addEventListener('click',function(){
      tabs.forEach(function(t){t.classList.remove('active')});
      tab.classList.add('active');
      var id=sections[tab.getAttribute('data-tab')];
      if(!id)return;
      document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
      document.getElementById(id).classList.add('active');
      document.getElementById('page').scrollTop=0;
    });
  });
})();

// === PROGRESS BAR ===
(function(){
  var bar=document.getElementById('progress-bar');
  var page=document.getElementById('page');
  page.addEventListener('scroll',function(){
    var h=page.scrollHeight-page.clientHeight;
    bar.style.width=(page.scrollTop/h*100)+'%';
  });
})();

// === SCROLL REVEAL (tab change animation) ===
setTimeout(function(){
  document.querySelectorAll('.section>*').forEach(function(el,i){
    el.style.opacity='0';
    setTimeout(function(){el.style.opacity='1'},50);
  });
},100);
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
