<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>Ilya | Python Developer</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--bg2:#16213e;--card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.08);--card-hover:rgba(255,255,255,0.07);--accent:#4f8cff;--accent2:#6c63ff;--accent-dim:rgba(79,140,255,0.12);--text:#e8e8f0;--text-dim:#8888aa;--text-muted:#555577;--radius:14px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,0.2);--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:4px}

/* subtle animated bg */
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(79,140,255,0.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(108,99,255,0.04) 0%,transparent 50%);pointer-events:none;z-index:0;animation:bgShift 20s ease-in-out infinite alternate}
@keyframes bgShift{0%{transform:translate(0,0)}100%{transform:translate(-30px,-20px)}}

.app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

/* Tab Bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(26,26,46,0.92);border-top:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.tabbar-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text-muted);font-family:var(--font);font-size:10px;font-weight:500;cursor:pointer;padding:4px 16px;transition:all 0.3s;-webkit-tap-highlight-color:transparent;position:relative}
.tabbar-btn .tab-icon{font-size:20px;line-height:1;transition:all 0.3s}
.tabbar-btn.active{color:var(--accent)}
.tabbar-btn.active .tab-icon{transform:translateY(-1px)}
.tabbar-btn.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--accent);border-radius:0 0 4px 4px}

/* Page */
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 20px 80px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.section{display:none;animation:fadeSlide 0.4s ease}
.section.active{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{padding:16px;border-radius:var(--radius);background:var(--card);border:1px solid var(--card-border);transition:all 0.3s}
.card:hover{background:var(--card-hover);border-color:rgba(255,255,255,0.12)}

/* HOME */
.home{display:flex;flex-direction:column;align-items:center;padding:24px 0 10px;text-align:center}
.avatar-wrap{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#fff;margin-bottom:14px;position:relative;box-shadow:0 0 40px rgba(79,140,255,0.2)}
.avatar-wrap::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(79,140,255,0.2);animation:avatarPulse 3s ease-in-out infinite}
@keyframes avatarPulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.name{font-size:26px;font-weight:700;color:var(--text);margin-bottom:2px}
.role{font-size:14px;color:var(--text-dim);margin-bottom:16px}
.status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);margin-bottom:20px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.3}}

.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;border-radius:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer;text-decoration:none;transition:all 0.3s;box-shadow:0 4px 20px rgba(79,140,255,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(79,140,255,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary img{width:16px;height:16px;filter:brightness(0) invert(1)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;margin-top:24px}
.stat{padding:12px 8px;border-radius:var(--radius-sm);background:var(--card);border:1px solid var(--card-border);text-align:center}
.stat-num{font-size:20px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

.tech-stack{display:flex;gap:12px;margin-top:20px;padding:12px 20px;border-radius:30px;background:var(--card);border:1px solid var(--card-border)}
.tech-stack span{font-size:22px;opacity:0.7;transition:all 0.3s}
.tech-stack span:hover{opacity:1;transform:translateY(-2px)}

/* Section header */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-header h2{font-size:18px;font-weight:700;color:var(--text)}
.section-header .line{flex:1;height:1px;background:var(--card-border)}

/* PROJECT FILTERS */
.project-filters{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.project-filters::-webkit-scrollbar{height:2px;background:transparent}
.filter-btn{padding:6px 14px;font-size:12px;font-weight:500;border:1px solid var(--card-border);background:var(--card);color:var(--text-dim);cursor:pointer;transition:all 0.3s;white-space:nowrap;border-radius:20px;font-family:var(--font)}
.filter-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}

/* PROJECT GRID */
.project-grid{display:flex;flex-direction:column;gap:10px}
.project-card{display:flex;align-items:center;gap:14px;padding:14px;border-radius:var(--radius-sm);background:var(--card);border:1px solid var(--card-border);text-decoration:none;color:inherit;transition:all 0.3s;cursor:pointer}
.project-card:hover{border-color:rgba(79,140,255,0.2);transform:translateX(4px);background:var(--card-hover)}
.project-card-icon{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.project-card-body{flex:1;min-width:0}
.project-card-title{font-size:14px;font-weight:600;color:var(--text)}
.project-card-desc{font-size:12px;color:var(--text-dim);margin-top:1px}
.project-card-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.project-tag{font-size:9px;padding:2px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent);font-weight:500}
.project-card-arrow{color:var(--text-muted);font-size:18px;transition:all 0.3s}
.project-card:hover .project-card-arrow{color:var(--accent);transform:translateX(4px)}

/* SERVICES */
.services-grid{display:flex;flex-direction:column;gap:10px}
.service-card{padding:18px;border-radius:var(--radius);background:var(--card);border:1px solid var(--card-border);transition:all 0.3s;text-decoration:none;color:inherit;display:block}
.service-card:hover{border-color:rgba(79,140,255,0.15);transform:translateY(-2px);background:var(--card-hover)}
.service-card.featured{background:linear-gradient(135deg,rgba(79,140,255,0.06),rgba(108,99,255,0.04));border-color:rgba(79,140,255,0.15)}
.service-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.service-card-left{display:flex;align-items:center;gap:12px}
.service-card-icon{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:20px}
.service-card-title{font-size:15px;font-weight:600;color:var(--text)}
.service-card-price{font-size:20px;font-weight:700;color:var(--accent)}
.service-features{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.service-feature{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.service-feature::before{content:'✓';color:var(--accent);font-weight:700}
.service-btn{width:100%;padding:9px;border-radius:20px;background:transparent;border:1px solid var(--card-border);color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.3s;font-family:var(--font)}
.service-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.featured-badge{display:inline-block;font-size:9px;padding:2px 10px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;margin-left:8px;letter-spacing:0.5px}

/* CONTACTS */
.contacts{display:flex;flex-direction:column;align-items:center;padding:16px 0;text-align:center}
.contact-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin-bottom:12px;box-shadow:0 0 30px rgba(79,140,255,0.15)}
.contact-name{font-size:22px;font-weight:700;color:var(--text)}
.contact-role{font-size:13px;color:var(--text-dim);margin-bottom:20px}

.contact-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}
.contact-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--radius-sm);background:var(--card);border:1px solid var(--card-border);text-decoration:none;color:var(--text);transition:all 0.3s}
.contact-item:hover{border-color:rgba(79,140,255,0.2);transform:translateX(4px);background:var(--card-hover)}
.contact-item-icon{width:36px;height:36px;border-radius:8px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-item-icon img{width:18px;height:18px}
.contact-item-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
.contact-item-value{font-size:14px;color:var(--text);font-weight:500}
.contact-item:hover .contact-item-value{color:var(--accent)}

.social-row{display:flex;gap:10px;margin-top:16px}
.social-link{width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all 0.3s}
.social-link:hover{background:var(--contact-hover,var(--card-hover));border-color:rgba(79,140,255,0.2);transform:translateY(-2px)}
.social-link img{width:20px;height:20px;opacity:0.5;transition:all 0.3s}
.social-link:hover img{opacity:0.8}

@media(min-width:500px){.project-grid,.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}}
</style>
</head>

<nav class="tabbar" id="tabbar">
  <button class="tabbar-btn active" data-tab="home"><span class="tab-icon">🏠</span><span>Home</span></button>
  <button class="tabbar-btn" data-tab="projects"><span class="tab-icon">💻</span><span>Projects</span></button>
  <button class="tabbar-btn" data-tab="services"><span class="tab-icon">⚡</span><span>Services</span></button>
  <button class="tabbar-btn" data-tab="contacts"><span class="tab-icon">📞</span><span>Contact</span></button>
</nav>

<script>
// Telegram WebApp
if(window.Telegram&&window.Telegram.WebApp){var tg=window.Telegram.WebApp;tg.expand();tg.ready()}

// Project data
var projects=[
  {title:'Appointment Bot',desc:'Booking bot for barbershops & salons',emoji:'📅',cat:'bots',tags:['aiogram','FSM'],url:'https://github.com/pipupip/appointment-bot'},
  {title:'Digital Shop',desc:'Telegram store for digital goods',emoji:'🛒',cat:'bots',tags:['aiogram','SQLite'],url:'https://github.com/pipupip/digital-shop-bot'},
  {title:'Booking Bot',desc:'Full-featured booking system',emoji:'🔧',cat:'bots',tags:['aiogram','FSM','Reminders'],url:'https://github.com/pipupip/bookingbot'},
  {title:'Admin Panel',desc:'Web dashboard for Telegram bots',emoji:'⚙️',cat:'web',tags:['FastAPI','Jinja2'],url:'https://github.com/pipupip/bot-admin-panel'},
  {title:'Classifieds Parser',desc:'Ad monitoring with alerts',emoji:'📊',cat:'parsers',tags:['BS4','SQLite'],url:'https://github.com/pipupip/classifieds-parser'},
  {title:'Advanced Parser',desc:'Multi-platform async parser',emoji:'🤖',cat:'parsers',tags:['Async','aiohttp'],url:'https://github.com/pipupip/parser-advanced'},
  {title:'NextGen AI',desc:'AI agency corporate site',emoji:'🌐',cat:'web',tags:['HTML','CSS','JS'],url:'https://github.com/pipupip/nextgen-ai'},
  {title:'Portfolio Site',desc:'Developer portfolio website',emoji:'🎨',cat:'web',tags:['HTML','CSS','JS'],url:'https://github.com/pipupip/portfolio'}
];

var services=[
  {title:'Telegram Bot',price:'$200',emoji:'🤖',features:['Booking system','Admin panel','24/7 support'],featured:false},
  {title:'Data Parser',price:'$150',emoji:'📊',features:['Custom selectors','Multi-format export','Auto-updates'],featured:false},
  {title:'Website',price:'$300',emoji:'🌐',features:['Responsive design','SEO optimized','Form integration'],featured:false},
  {title:'Quick Start',price:'$500',emoji:'🚀',features:['Website + Bot','Video promo','Priority support'],featured:true}
];

// Render projects
(function(){
  var grid=document.getElementById('project-grid');
  function render(filter){
    var html='';
    projects.forEach(function(p,i){
      if(filter!=='all'&&p.cat!==filter)return;
      html+='<a href="'+p.url+'" target="_blank" class="project-card" style="animation:fadeSlide 0.4s ease '+(i*0.04)+'s both">'+
        '<div class="project-card-icon">'+p.emoji+'</div>'+
        '<div class="project-card-body">'+
          '<div class="project-card-title">'+p.title+'</div>'+
          '<div class="project-card-desc">'+p.desc+'</div>'+
          '<div class="project-card-tags">'+p.tags.map(function(t){return'<span class="project-tag">'+t+'</span>'}).join('')+'</div>'+
        '</div>'+
        '<span class="project-card-arrow">→</span>'+
      '</a>';
    });
    grid.innerHTML=html||'<div style="text-align:center;padding:40px;color:var(--text-dim)">Nothing here</div>';
  }
  render('all');
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      render(btn.getAttribute('data-filter'));
    });
  });
})();

// Render services
(function(){
  var grid=document.getElementById('services-grid');
  var html='';
  services.forEach(function(s){
    html+='<div class="service-card'+(s.featured?' featured':'')+'">'+
      '<div class="service-card-top">'+
        '<div class="service-card-left"><div class="service-card-icon">'+s.emoji+'</div><div><div class="service-card-title">'+s.title+(s.featured?' <span class="featured-badge">BEST</span>':'')+'</div></div></div>'+
        '<div class="service-card-price">'+s.price+'</div>'+
      '</div>'+
      '<div class="service-features">'+s.features.map(function(f){return'<div class="service-feature">'+f+'</div>'}).join('')+'</div>'+
      '<button class="service-btn" onclick="window.open(\'https://t.me/biggesttroll\',\'_blank\')">Order →</button>'+
    '</div>';
  });
  grid.innerHTML=html;
})();

// Tab navigation
(function(){
  var tabs=document.querySelectorAll('.tabbar-btn');
  var map={home:'s-home',projects:'s-projects',services:'s-services',contacts:'s-contacts'};
  tabs.forEach(function(tab){
    tab.addEventListener('click',function(){
      tabs.forEach(function(t){t.classList.remove('active')});
      tab.classList.add('active');
      var id=map[tab.getAttribute('data-tab')];
      if(!id)return;
      document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
      document.getElementById(id).classList.add('active');
      document.getElementById('page').scrollTop=0;
    });
  });
})();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
