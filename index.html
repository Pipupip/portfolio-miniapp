<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<title>Ilya — Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0a12;
  --glass:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
  --glass-hover:rgba(255,255,255,0.07);
  --accent:#c8a2ff;
  --accent2:#ff6ec7;
  --accent3:#7b61ff;
  --warm:#f0b87a;
  --text:#eeeef0;
  --text-dim:#8888a0;
  --text-muted:#55556a;
  --radius:16px;
  --radius-sm:12px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
::selection{background:var(--accent);color:#0a0a12}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,162,255,0.3);border-radius:3px}

/* ═══════════ AURORA BACKGROUND ═══════════ */
.aurora{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.aurora-orb{position:absolute;border-radius:50%;filter:blur(100px);mix-blend-mode:screen;animation:drift linear infinite}
.aurora-1{width:600px;height:600px;background:radial-gradient(circle,rgba(123,97,255,0.25),transparent 70%);top:-20%;left:-15%;animation-duration:22s}
.aurora-2{width:500px;height:500px;background:radial-gradient(circle,rgba(255,110,199,0.18),transparent 70%);bottom:-20%;right:-15%;animation-duration:28s;animation-delay:-8s}
.aurora-3{width:400px;height:400px;background:radial-gradient(circle,rgba(200,162,255,0.15),transparent 70%);top:30%;left:40%;animation-duration:34s;animation-delay:-14s}
@keyframes drift{
  0%{transform:translate(0,0) rotate(0deg) scale(1)}
  25%{transform:translate(80px,-60px) rotate(90deg) scale(1.1)}
  50%{transform:translate(-40px,80px) rotate(180deg) scale(0.9)}
  75%{transform:translate(60px,40px) rotate(270deg) scale(1.05)}
  100%{transform:translate(0,0) rotate(360deg) scale(1)}
}

/* floating sparkles */
.sparkle{position:fixed;width:2px;height:2px;background:#fff;border-radius:50%;pointer-events:none;z-index:0;animation:sparkleFloat linear infinite}
@keyframes sparkleFloat{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ═══════════ LAYOUT ═══════════ */
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 20px 90px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;position:relative;z-index:1}

.section{display:none;opacity:0}
.section.active{display:block;animation:sectionIn .6s cubic-bezier(.22,1,.36,1) forwards}
@keyframes sectionIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══════════ SCROLL BAR ═══════════ */
#scroll-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent3),var(--accent),var(--accent2));z-index:999;width:0;transition:width 80ms linear;box-shadow:0 0 20px rgba(200,162,255,0.4)}

/* ═══════════ TAB BAR ═══════════ */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:68px;background:rgba(10,10,18,0.85);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;gap:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.tabbar-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text-muted);font-family:var(--font);font-size:9px;font-weight:600;cursor:pointer;padding:6px 20px;transition:all .4s cubic-bezier(.22,1,.36,1);-webkit-tap-highlight-color:transparent;letter-spacing:.6px;text-transform:uppercase;position:relative}
.tabbar-btn .tab-icon{font-size:22px;line-height:1;transition:all .4s cubic-bezier(.22,1,.36,1);filter:grayscale(1) brightness(0.6)}
.tabbar-btn.active{color:var(--accent)}
.tabbar-btn.active .tab-icon{transform:translateY(-3px) scale(1.15);filter:grayscale(0) brightness(1)}
.tabbar-btn.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--accent);border-radius:1px;box-shadow:0 0 12px var(--accent)}

/* ═══════════ STAGGERED REVEAL ═══════════ */
.reveal{opacity:0;transform:translateY(20px);transition:all .6s cubic-bezier(.22,1,.36,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal:nth-child(1){transition-delay:.05s}
.reveal:nth-child(2){transition-delay:.1s}
.reveal:nth-child(3){transition-delay:.15s}
.reveal:nth-child(4){transition-delay:.2s}
.reveal:nth-child(5){transition-delay:.25s}
.reveal:nth-child(6){transition-delay:.3s}
.reveal:nth-child(7){transition-delay:.35s}
.reveal:nth-child(8){transition-delay:.4s}

/* ═══════════ HOME ═══════════ */
.home{display:flex;flex-direction:column;align-items:center;padding:36px 0 10px;text-align:center}

.avatar-ring{width:100px;height:100px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));margin-bottom:18px;animation:ringPulse 4s ease-in-out infinite;position:relative}
.avatar-ring::after{content:'';position:absolute;inset:-6px;border-radius:50%;background:conic-gradient(var(--accent),var(--accent2),var(--accent3),var(--accent));filter:blur(16px);opacity:.25;animation:ringSpin 8s linear infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 20px rgba(200,162,255,0.2)}50%{box-shadow:0 0 40px rgba(200,162,255,0.35)}}
@keyframes ringSpin{to{transform:rotate(360deg)}}
.avatar{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#12121e);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--accent);letter-spacing:2px;position:relative;z-index:1}

.name{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:-.5px}
.role{font-size:14px;color:var(--text-dim);margin-bottom:10px;font-weight:400;letter-spacing:.3px}

.status-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);margin-bottom:24px;padding:6px 16px;border-radius:24px;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7;box-shadow:0 0 8px rgba(110,231,183,0.5);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* CTA button */
.btn-glow{position:relative;display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;text-decoration:none;transition:all .4s cubic-bezier(.22,1,.36,1);overflow:hidden;letter-spacing:.3px}
.btn-glow::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent2),var(--accent));opacity:0;transition:opacity .4s}
.btn-glow:hover::before{opacity:1}
.btn-glow span,.btn-glow img{position:relative;z-index:1}
.btn-glow img{width:18px;height:18px;filter:brightness(10)}
.btn-glow:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 32px rgba(200,162,255,0.35)}
.btn-glow:active{transform:translateY(-1px) scale(.99)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;margin-top:28px;padding:20px;border-radius:var(--radius);background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.stat{text-align:center;position:relative}
.stat-num{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.stat-label{font-size:9px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* Tech icons */
.tech-row{display:flex;gap:14px;margin-top:22px}
.tech-icon{width:42px;height:42px;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .4s cubic-bezier(.22,1,.36,1);cursor:default}
.tech-icon:hover{transform:translateY(-4px) scale(1.1);background:var(--glass-hover);box-shadow:0 8px 24px rgba(200,162,255,0.15)}

/* ═══════════ SECTION HEADER ═══════════ */
.section-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.section-header h2{font-size:20px;font-weight:800;color:var(--text);white-space:nowrap;letter-spacing:-.3px}
.section-header .line{flex:1;height:1px;background:linear-gradient(90deg,var(--glass-border),transparent);border:none}

/* ═══════════ FILTERS ═══════════ */
.filters{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{height:0}
.filter-btn{padding:7px 18px;font-size:12px;font-weight:600;border:1px solid var(--glass-border);background:var(--glass);color:var(--text-dim);cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);white-space:nowrap;border-radius:24px;font-family:var(--font);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.filter-btn.active{background:linear-gradient(135deg,rgba(200,162,255,0.15),rgba(255,110,199,0.1));color:var(--accent);border-color:rgba(200,162,255,0.25);box-shadow:0 0 16px rgba(200,162,255,0.1)}
.filter-btn:hover:not(.active){color:var(--text);border-color:rgba(255,255,255,0.12)}

/* ═══════════ PROJECTS ═══════════ */
.project-list{display:flex;flex-direction:column;gap:10px}
.project-card{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--glass-border);text-decoration:none;color:inherit;transition:all .4s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.project-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,162,255,0.06),rgba(255,110,199,0.04));opacity:0;transition:opacity .4s}
.project-card:hover::before{opacity:1}
.project-card:hover{border-color:rgba(200,162,255,0.2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,162,255,0.08)}
.project-icon-wrap{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,rgba(200,162,255,0.1),rgba(255,110,199,0.08));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;z-index:1;transition:all .4s}
.project-card:hover .project-icon-wrap{transform:scale(1.08);box-shadow:0 4px 16px rgba(200,162,255,0.15)}
.project-body{flex:1;min-width:0;position:relative;z-index:1}
.project-title{font-size:15px;font-weight:700;color:var(--text)}
.project-desc{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.project-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.project-tag{font-size:9px;padding:3px 10px;border-radius:12px;background:rgba(200,162,255,0.08);color:var(--accent);font-weight:600;letter-spacing:.3px}
.project-arrow{color:var(--text-muted);font-size:18px;transition:all .4s cubic-bezier(.22,1,.36,1);position:relative;z-index:1}
.project-card:hover .project-arrow{color:var(--accent);transform:translateX(6px)}

/* ═══════════ SERVICES ═══════════ */
.services-list{display:flex;flex-direction:column;gap:10px}
.service-card{padding:22px;border-radius:var(--radius);background:var(--glass);border:1px solid var(--glass-border);transition:all .4s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.service-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,162,255,0.04),transparent);opacity:0;transition:opacity .4s}
.service-card:hover::before{opacity:1}
.service-card:hover{border-color:rgba(200,162,255,0.15);transform:translateY(-2px)}
.service-card.featured{border-color:rgba(200,162,255,0.2);background:linear-gradient(135deg,rgba(200,162,255,0.06),rgba(255,110,199,0.03))}
.service-card.featured::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.service-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;position:relative;z-index:1}
.service-left{display:flex;align-items:center;gap:14px}
.service-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,rgba(200,162,255,0.1),rgba(255,110,199,0.08));display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .4s}
.service-card:hover .service-icon{transform:scale(1.08)}
.service-name{font-size:16px;font-weight:700;color:var(--text)}
.service-price{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1}
.service-features{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;position:relative;z-index:1}
.service-feature{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.service-feature::before{content:'';width:14px;height:14px;border-radius:50%;background:rgba(200,162,255,0.1);display:flex;align-items:center;justify-content:center;content:'✓';font-size:8px;color:var(--accent);font-weight:700;flex-shrink:0}
.service-btn{width:100%;padding:10px;border-radius:24px;background:transparent;border:1px solid var(--glass-border);color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;transition:all .4s cubic-bezier(.22,1,.36,1);font-family:var(--font);position:relative;z-index:1;letter-spacing:.3px}
.service-btn:hover{background:rgba(200,162,255,0.08);color:var(--accent);border-color:rgba(200,162,255,0.25);box-shadow:0 0 16px rgba(200,162,255,0.08)}
.service-card.featured .service-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0a12;border:none;font-weight:700}
.service-card.featured .service-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(200,162,255,0.3)}
.best-badge{display:inline-block;font-size:9px;padding:3px 10px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0a12;font-weight:800;margin-left:8px;letter-spacing:.5px;vertical-align:middle}

/* ═══════════ CONTACTS ═══════════ */
.contacts{display:flex;flex-direction:column;align-items:center;padding:24px 0;text-align:center}
.contact-avatar-wrap{width:90px;height:90px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));margin-bottom:16px;position:relative}
.contact-avatar-wrap::after{content:'';position:absolute;inset:-8px;border-radius:50%;background:conic-gradient(var(--accent),var(--accent2),var(--accent3),var(--accent));filter:blur(20px);opacity:.2;animation:ringSpin 8s linear infinite}
.contact-avatar{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#12121e);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--accent);position:relative;z-index:1;letter-spacing:2px}
.contact-name{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px}
.contact-role{font-size:13px;color:var(--text-dim);margin-bottom:24px;font-weight:400}

.contact-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px}
.contact-item{display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--glass-border);text-decoration:none;color:var(--text);transition:all .4s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative;overflow:hidden}
.contact-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,162,255,0.04),transparent);opacity:0;transition:opacity .4s}
.contact-item:hover::before{opacity:1}
.contact-item:hover{border-color:rgba(200,162,255,0.2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(200,162,255,0.08)}
.contact-item-icon{width:40px;height:40px;border-radius:12px;background:rgba(200,162,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;transition:all .4s}
.contact-item:hover .contact-item-icon{transform:scale(1.08);box-shadow:0 0 12px rgba(200,162,255,0.15)}
.contact-item-icon img{width:22px;height:22px}
.contact-item-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.contact-item-value{font-size:15px;color:var(--text);font-weight:600}
.contact-item:hover .contact-item-value{color:var(--accent)}

.social-row{display:flex;gap:12px;margin-top:24px}
.social-link{width:48px;height:48px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .4s cubic-bezier(.22,1,.36,1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.social-link img{width:22px;height:22px;opacity:.45;transition:all .4s}
.social-link:hover{background:var(--glass-hover);border-color:rgba(200,162,255,0.2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(200,162,255,0.1)}
.social-link:hover img{opacity:.85;filter:drop-shadow(0 0 6px rgba(200,162,255,0.3))}

/* ═══════════ FOOTER ═══════════ */
.footer{text-align:center;padding:30px 0 10px;font-size:11px;color:var(--text-muted);letter-spacing:.3px}
.footer a{color:var(--accent);text-decoration:none}

@media(min-width:500px){.project-list,.services-list{display:grid;grid-template-columns:1fr 1fr;gap:12px}}
</style>
</head>
<body>

<!-- AURORA BG -->
<div class="aurora">
  <div class="aurora-orb aurora-1"></div>
  <div class="aurora-orb aurora-2"></div>
  <div class="aurora-orb aurora-3"></div>
</div>

<!-- SPARKLES -->
<div id="sparkles"></div>

<div id="scroll-bar"></div>

<div class="app">
<div class="page" id="page">

<!-- ═══ HOME ═══ -->
<div class="section active" id="s-home">
  <div class="home">
    <div class="avatar-ring reveal"><div class="avatar">IL</div></div>
    <div class="name reveal">Ilya</div>
    <div class="role reveal">Python Developer &amp; Media Creator</div>
    <div class="status-pill reveal"><span class="status-dot"></span> open to work</div>
    <a href="https://t.me/biggesttroll" target="_blank" class="btn-glow reveal">
      <img src="icons/telegram.png" alt="TG"><span>Contact me</span>
    </a>
    <div class="stats reveal">
      <div class="stat"><div class="stat-num" data-target="47">0</div><div class="stat-label">Projects</div></div>
      <div class="stat"><div class="stat-num" data-target="32">0</div><div class="stat-label">Clients</div></div>
      <div class="stat"><div class="stat-num" data-target="98" data-suffix="%">0</div><div class="stat-label">Ontime</div></div>
      <div class="stat"><div class="stat-num" data-target="5">0</div><div class="stat-label">Years</div></div>
    </div>
    <div class="tech-row reveal">
      <div class="tech-icon">🐍</div>
      <div class="tech-icon">🤖</div>
      <div class="tech-icon">⚡</div>
      <div class="tech-icon">🎬</div>
      <div class="tech-icon">📊</div>
      <div class="tech-icon">🌐</div>
    </div>
  </div>
</div>

<!-- ═══ PROJECTS ═══ -->
<div class="section" id="s-projects">
  <div class="section-header"><h2>Projects</h2><hr class="line"></div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="bots">Bots</button>
    <button class="filter-btn" data-filter="parsers">Parsers</button>
    <button class="filter-btn" data-filter="web">Web</button>
  </div>
  <div class="project-list" id="project-list"></div>
</div>

<!-- ═══ SERVICES ═══ -->
<div class="section" id="s-services">
  <div class="section-header"><h2>Services</h2><hr class="line"></div>
  <div class="services-list" id="services-list"></div>
</div>

<!-- ═══ CONTACTS ═══ -->

/* ═══ SPARKLES ═══ */
(function(){

    var s=document.createElement('div');
    s.className='sparkle';
    s.style.left=Math.random()*100+'%';
    s.style.animationDuration=(8+Math.random()*16)+'s';

    s.style.width=s.style.height=(1+Math.random()*2)+'px';
    s.style.opacity=0.2+Math.random()*0.5;
    c.appendChild(s)
  }
})();

/* ═══ SCROLL BAR ═══ */

/* ═══ COUNT UP ═══ */
function countUp(el,target,suffix,dur){
  var start=0,startTime=null;
  suffix=suffix||'';
  dur=dur||1200;
  function step(ts){
    if(!startTime)startTime=ts;
    var p=Math.min((ts-startTime)/dur,1);
    var ease=1-Math.pow(1-p,3);
    el.textContent=Math.floor(ease*target)+suffix;
    if(p<1)requestAnimationFrame(step);
    else el.textContent=target+suffix
  }
  requestAnimationFrame(step)
}

/* ═══ REVEAL ON SCROLL ═══ */
function initReveals(els){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})
  },{threshold:0.1});
  els.forEach(function(el){obs.observe(el)})
}

/* ═══ RENDER PROJECTS ═══ */
(function(){
  var list=document.getElementById('project-list');

      h+='<a href="'+p.url+'" target="_blank" class="project-card reveal">'+

        '<span class="project-arrow">→</span></a>'
    });
    list.innerHTML=h||'<div style="text-align:center;padding:40px;color:var(--text-dim)">No projects</div>';
    initReveals(list.querySelectorAll('.reveal'))
  }
  render('all');

    b.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(x){x.classList.remove('active')});

    })
  })
})();
